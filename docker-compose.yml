services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Where nginx forwards /api. Defaults to the backend's published port on
      # the same VM, reached through the host gateway below.
      API_UPSTREAM: ${API_UPSTREAM:-http://host.docker.internal:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WEB_PORT:-8081}:80"
    restart: unless-stopped
